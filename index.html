<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Yurika · Mindmap Journal</title>

    <!-- PWA META TAGS -->
    <link rel="manifest" href="manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Yurika" />
    <meta name="theme-color" content="#0c0b14" />
    <meta name="description" content="Mindmap journaling for clarity and calm." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <style>
        /* ----- RESET & BASE ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0c0b14;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            color: #e2e0f0;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(145deg, #14121f 0%, #1a1727 100%);
            box-shadow: 0 0 60px rgba(80, 60, 180, 0.15);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .app-container::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -30%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(100, 70, 220, 0.10) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ----- HEADER ----- */
        .app-header {
            padding: 24px 24px 8px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #a78bfa, #6ee7b7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: #0c0b14;
            box-shadow: 0 4px 15px rgba(167, 139, 250, 0.3);
            animation: pulse-logo 3s ease-in-out infinite;
        }

        @keyframes pulse-logo {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 4px 25px rgba(167, 139, 250, 0.5);
            }
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #e2e0f0, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo span {
            font-size: 12px;
            font-weight: 300;
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            -webkit-text-fill-color: #9a94b0;
            letter-spacing: 0.3px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6ee7b7;
            box-shadow: 0 0 15px #6ee7b7;
            animation: breathe-dot 2s ease-in-out infinite;
        }

        @keyframes breathe-dot {
            0%,
            100% {
                opacity: 0.4;
                transform: scale(0.9);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* ----- MAIN CONTENT ----- */
        .tab-content {
            flex: 1;
            overflow: hidden;
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
        }

        .tab-pane {
            display: none;
            flex-direction: column;
            height: 100%;
            animation: fadeSlide 0.35s ease-out;
        }

        .tab-pane.active {
            display: flex;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ----- JOURNAL PANE ----- */
        .journal-input-area {
            padding: 16px 20px 8px 20px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .journal-input-area label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #b4adcf;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .journal-input-row {
            display: flex;
            gap: 10px;
        }

        .journal-input-area textarea {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 12px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #e8e4f5;
            resize: vertical;
            min-height: 50px;
            max-height: 100px;
            transition: border 0.2s;
            outline: none;
            line-height: 1.5;
        }

        .journal-input-area textarea:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.15);
        }

        .journal-input-area textarea::placeholder {
            color: #5d567a;
            font-weight: 300;
        }

        .journal-actions {
            display: flex;
            flex-direction: column;
            gap: 6px;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c65c9, #a78bfa);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            color: #0c0b14;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(167, 139, 250, 0.25);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(167, 139, 250, 0.4);
        }
        .btn-primary:active {
            transform: scale(0.97);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #b4adcf;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e0f0;
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* ----- MINDMAP VIEW ----- */
        .mindmap-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: transparent;
            touch-action: none;
        }

        .mindmap-container svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .mindmap-container svg path {
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 2;
            fill: none;
        }

        .mindmap-nodes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .mindmap-node {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 10px 16px;
            min-width: 60px;
            max-width: 160px;
            text-align: center;
            font-size: 13px;
            line-height: 1.4;
            color: #e2e0f0;
            cursor: grab;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            user-select: none;
            word-wrap: break-word;
            white-space: pre-wrap;
            touch-action: none;
        }

        .mindmap-node:hover {
            border-color: rgba(167, 139, 250, 0.3);
            box-shadow: 0 6px 30px rgba(167, 139, 250, 0.1);
        }

        .mindmap-node.dragging {
            opacity: 0.8;
            cursor: grabbing;
            z-index: 100;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        .mindmap-node .node-label {
            pointer-events: none;
        }

        .mindmap-node .add-child-btn {
            position: absolute;
            bottom: -12px;
            right: -12px;
            width: 26px;
            height: 26px;
            background: rgba(167, 139, 250, 0.2);
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 50%;
            color: #d4ccf0;
            font-size: 16px;
            line-height: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 300;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .mindmap-node .add-child-btn:hover {
            background: rgba(167, 139, 250, 0.4);
            transform: scale(1.1);
            border-color: #a78bfa;
        }

        .mindmap-node .edit-input {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #a78bfa;
            border-radius: 8px;
            color: #e2e0f0;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            padding: 4px 8px;
            width: 100%;
            outline: none;
            text-align: center;
        }

        .mindmap-node .child-input-container {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 8px;
            background: rgba(20, 17, 34, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 6px;
            display: none;
            z-index: 200;
            width: 140px;
        }

        .mindmap-node .child-input-container.open {
            display: block;
        }

        .mindmap-node .child-input-container input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 6px 10px;
            color: #e2e0f0;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            outline: none;
        }

        .mindmap-node .child-input-container input:focus {
            border-color: #a78bfa;
        }

        .mindmap-node .child-input-container .btn-add {
            margin-top: 4px;
            background: #a78bfa;
            border: none;
            border-radius: 8px;
            color: #0c0b14;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        /* Empty state for mindmap */
        .mindmap-empty {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #5d567a;
            font-size: 14px;
            pointer-events: none;
        }

        .mindmap-empty .big-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.4;
        }

        .mindmap-empty h3 {
            font-weight: 400;
            font-size: 16px;
            color: #7b7499;
        }

        /* ----- BOTTOM NAV ----- */
        .bottom-nav {
            display: flex;
            background: rgba(20, 17, 34, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px 10px 16px 10px;
            flex-shrink: 0;
            position: relative;
            z-index: 20;
            justify-content: center;
        }

        .bottom-nav .nav-item {
            flex: 0 1 auto;
            padding: 8px 24px;
            border-radius: 30px;
            background: rgba(167, 139, 250, 0.1);
            border: 1px solid rgba(167, 139, 250, 0.15);
            color: #c9c3df;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: default;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 400px) {
            .app-header {
                padding: 16px 16px 4px 16px;
            }
            .journal-input-area {
                padding: 12px 14px 6px 14px;
            }
            .journal-input-area textarea {
                font-size: 13px;
                min-height: 40px;
            }
            .btn-primary {
                font-size: 12px;
                padding: 6px 12px;
            }
            .mindmap-node {
                font-size: 12px;
                padding: 8px 12px;
                max-width: 120px;
            }
        }

        @media (min-width: 600px) {
            .app-container {
                border-radius: 32px;
                margin: 20px;
                height: calc(100vh - 40px);
                max-height: 800px;
                box-shadow: 0 20px 80px rgba(0, 0, 0, 0.7);
            }
        }
    </style>
</head>
<body>

<div class="app-container" id="app">

    <!-- HEADER -->
    <header class="app-header">
        <div class="logo">
            <div class="logo-icon">Y</div>
            <h1>Yurika</h1>
            <span>Journal</span>
        </div>
        <div class="status-dot" title="Calm mode"></div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="tab-content" id="tabContent">
        <div class="tab-pane active" id="tabJournal">
            <!-- Input area -->
            <div class="journal-input-area">
                <label for="journalInput">📝 Journal entry</label>
                <div class="journal-input-row">
                    <textarea id="journalInput" placeholder="Write your main thought or journal entry…" rows="2"></textarea>
                    <div class="journal-actions">
                        <button class="btn-primary" id="createMindmapBtn">✦ Create</button>
                        <button class="btn-secondary" id="autoLayoutBtn">⟳ Layout</button>
                        <button class="btn-secondary" id="clearBtn">✕ Clear</button>
                    </div>
                </div>
            </div>

            <!-- Mindmap view -->
            <div class="mindmap-container" id="mindmapContainer">
                <svg id="mindmapSvg"></svg>
                <div class="mindmap-nodes" id="mindmapNodes"></div>
                <div class="mindmap-empty" id="mindmapEmpty">
                    <div class="big-icon">🌱</div>
                    <h3>Write a journal entry above<br />and click "Create" to start your mindmap.</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAV (single tab) -->
    <div class="bottom-nav">
        <div class="nav-item">🧭 Journal</div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // ============================================================
        // 1. MINDMAP DATA MODEL
        // ============================================================
        let nextId = 1;
        let mindmapData = null; // root node { id, text, children, x, y }

        // DOM refs
        const journalInput = document.getElementById('journalInput');
        const createBtn = document.getElementById('createMindmapBtn');
        const autoLayoutBtn = document.getElementById('autoLayoutBtn');
        const clearBtn = document.getElementById('clearBtn');
        const mindmapNodes = document.getElementById('mindmapNodes');
        const mindmapSvg = document.getElementById('mindmapSvg');
        const mindmapEmpty = document.getElementById('mindmapEmpty');

        // Drag state
        let dragNode = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let dragStartX = 0;
        let dragStartY = 0;

        // Active child input
        let activeChildInput = null; // node element

        // ============================================================
        // 2. PERSISTENCE (localStorage)
        // ============================================================
        function saveMindmap() {
            if (mindmapData) {
                localStorage.setItem('yurika_journal_mindmap', JSON.stringify(mindmapData));
                localStorage.setItem('yurika_journal_nextId', String(nextId));
            }
        }

        function loadMindmap() {
            const saved = localStorage.getItem('yurika_journal_mindmap');
            if (saved) {
                try {
                    mindmapData = JSON.parse(saved);
                    nextId = parseInt(localStorage.getItem('yurika_journal_nextId')) || 1;
                    renderMindmap();
                    return true;
                } catch (e) {
                    console.warn('Failed to load saved mindmap', e);
                }
            }
            return false;
        }

        // ============================================================
        // 3. LAYOUT ENGINE (simple tree)
        // ============================================================
        function computeWidth(node) {
            if (!node || !node.children || node.children.length === 0) return 1;
            let sum = 0;
            for (let child of node.children) {
                sum += computeWidth(child);
            }
            return sum;
        }

        function layoutTree(node, x, y, xSpacing, ySpacing) {
            if (!node) return;
            node.x = x;
            node.y = y;

            const children = node.children || [];
            if (children.length === 0) return;

            // Compute total width of children
            const childWidths = children.map(c => computeWidth(c));
            const totalWidth = childWidths.reduce((a, b) => a + b, 0);
            const spacing = xSpacing;
            // Start x offset from left
            let currentX = x - (totalWidth * spacing) / 2 + spacing / 2;

            for (let i = 0; i < children.length; i++) {
                const child = children[i];
                const childWidth = childWidths[i];
                const childX = currentX + (childWidth - 1) * spacing / 2;
                layoutTree(child, childX, y + ySpacing, spacing, ySpacing);
                currentX += childWidth * spacing;
            }
        }

        function autoLayout() {
            if (!mindmapData) return;
            const container = document.getElementById('mindmapContainer');
            const rect = container.getBoundingClientRect();
            const centerX = rect.width / 2;
            const startY = 60;
            const xSpacing = 200;
            const ySpacing = 150;
            layoutTree(mindmapData, centerX, startY, xSpacing, ySpacing);
            renderMindmap();
            saveMindmap();
        }

        // ============================================================
        // 4. RENDER MINDMAP (nodes + lines)
        // ============================================================
        function renderMindmap() {
            if (!mindmapData) {
                mindmapNodes.innerHTML = '';
                mindmapSvg.innerHTML = '';
                mindmapEmpty.style.display = 'block';
                return;
            }
            mindmapEmpty.style.display = 'none';

            // Build nodes HTML
            let html = '';
            let lines = [];

            function traverse(node, parentId) {
                if (!node) return;
                // Node div
                const left = node.x - 60; // approximate center offset
                const top = node.y - 20;
                html += `
                    <div class="mindmap-node" id="node-${node.id}" style="left:${left}px; top:${top}px;"
                         data-id="${node.id}">
                        <span class="node-label">${escapeHtml(node.text)}</span>
                        <div class="add-child-btn" data-id="${node.id}">+</div>
                        <div class="child-input-container" id="childInput-${node.id}">
                            <input type="text" placeholder="Branch title…" />
                            <button class="btn-add" data-id="${node.id}">Add</button>
                        </div>
                    </div>
                `;
                if (parentId !== null) {
                    lines.push({ from: parentId, to: node.id });
                }
                if (node.children) {
                    for (let child of node.children) {
                        traverse(child, node.id);
                    }
                }
            }

            traverse(mindmapData, null);
            mindmapNodes.innerHTML = html;

            // Draw lines
            let svgContent = '';
            for (let line of lines) {
                const fromNode = findNodeById(mindmapData, line.from);
                const toNode = findNodeById(mindmapData, line.to);
                if (fromNode && toNode) {
                    const x1 = fromNode.x;
                    const y1 = fromNode.y;
                    const x2 = toNode.x;
                    const y2 = toNode.y;
                    svgContent += `<path d="M${x1},${y1} L${x2},${y2}" />`;
                }
            }
            mindmapSvg.innerHTML = svgContent;

            // Attach event listeners after DOM update
            attachNodeEvents();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function findNodeById(node, id) {
            if (!node) return null;
            if (node.id === id) return node;
            if (node.children) {
                for (let child of node.children) {
                    const found = findNodeById(child, id);
                    if (found) return found;
                }
            }
            return null;
        }

        // ============================================================
        // 5. EVENT HANDLING FOR NODES
        // ============================================================
        function attachNodeEvents() {
            // Add child button
            document.querySelectorAll('.add-child-btn').forEach(btn => {
                btn.removeEventListener('click', onAddChildClick);
                btn.addEventListener('click', onAddChildClick);
            });

            // Add button inside child input
            document.querySelectorAll('.btn-add').forEach(btn => {
                btn.removeEventListener('click', onAddChildConfirm);
                btn.addEventListener('click', onAddChildConfirm);
            });

            // Input fields for child – press Enter to confirm
            document.querySelectorAll('.child-input-container input').forEach(inp => {
                inp.removeEventListener('keydown', onChildInputKeydown);
                inp.addEventListener('keydown', onChildInputKeydown);
            });

            // Node drag
            document.querySelectorAll('.mindmap-node').forEach(nodeEl => {
                nodeEl.removeEventListener('mousedown', onNodeMouseDown);
                nodeEl.removeEventListener('touchstart', onNodeTouchStart);
                nodeEl.addEventListener('mousedown', onNodeMouseDown);
                nodeEl.addEventListener('touchstart', onNodeTouchStart);
                // Double-click to edit
                nodeEl.removeEventListener('dblclick', onNodeDblClick);
                nodeEl.addEventListener('dblclick', onNodeDblClick);
            });
        }

        // ----- Add child -----
        function onAddChildClick(e) {
            e.stopPropagation();
            const id = parseInt(this.dataset.id);
            const container = document.getElementById(`childInput-${id}`);
            if (!container) return;
            // Close any other open child inputs
            document.querySelectorAll('.child-input-container.open').forEach(el => {
                if (el.id !== container.id) el.classList.remove('open');
            });
            container.classList.toggle('open');
            if (container.classList.contains('open')) {
                const input = container.querySelector('input');
                if (input) {
                    input.value = '';
                    input.focus();
                }
            }
        }

        function onAddChildConfirm(e) {
            e.stopPropagation();
            const id = parseInt(this.dataset.id);
            const container = document.getElementById(`childInput-${id}`);
            if (!container) return;
            const input = container.querySelector('input');
            if (!input) return;
            const text = input.value.trim();
            if (!text) return;
            // Add child to data
            const parent = findNodeById(mindmapData, id);
            if (!parent) return;
            if (!parent.children) parent.children = [];
            const newChild = {
                id: nextId++,
                text: text,
                children: [],
                x: parent.x + 100,
                y: parent.y + 150
            };
            parent.children.push(newChild);
            // Close input
            container.classList.remove('open');
            // Auto-layout for better placement
            autoLayout();
            saveMindmap();
            renderMindmap();
        }

        function onChildInputKeydown(e) {
            if (e.key === 'Enter') {
                const btn = this.closest('.child-input-container').querySelector('.btn-add');
                if (btn) btn.click();
            }
            if (e.key === 'Escape') {
                this.closest('.child-input-container').classList.remove('open');
            }
        }

        // ----- Edit node (double-click) -----
        function onNodeDblClick(e) {
            const nodeEl = this;
            const id = parseInt(nodeEl.dataset.id);
            const nodeData = findNodeById(mindmapData, id);
            if (!nodeData) return;
            // Replace label with input
            const labelSpan = nodeEl.querySelector('.node-label');
            const currentText = nodeData.text;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'edit-input';
            input.value = currentText;
            labelSpan.replaceWith(input);
            input.focus();
            input.select();

            const finishEdit = () => {
                const newText = input.value.trim() || currentText;
                nodeData.text = newText;
                renderMindmap();
                saveMindmap();
            };

            input.addEventListener('blur', finishEdit);
            input.addEventListener('keydown', (ev) => {
                if (ev.key === 'Enter') {
                    input.blur();
                }
                if (ev.key === 'Escape') {
                    input.value = currentText;
                    input.blur();
                }
            });
        }

        // ----- Drag (mouse) -----
        function onNodeMouseDown(e) {
            if (e.target.closest('.add-child-btn') || e.target.closest('.child-input-container')) return;
            if (e.target.closest('.edit-input')) return;
            e.preventDefault();
            const nodeEl = this;
            const id = parseInt(nodeEl.dataset.id);
            const nodeData = findNodeById(mindmapData, id);
            if (!nodeData) return;
            const rect = nodeEl.getBoundingClientRect();
            const containerRect = document.getElementById('mindmapContainer').getBoundingClientRect();
            dragNode = { el: nodeEl, data: nodeData };
            dragOffsetX = e.clientX - rect.left;
            dragOffsetY = e.clientY - rect.top;
            dragStartX = nodeData.x;
            dragStartY = nodeData.y;
            nodeEl.classList.add('dragging');

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        function onMouseMove(e) {
            if (!dragNode) return;
            const containerRect = document.getElementById('mindmapContainer').getBoundingClientRect();
            const newX = e.clientX - containerRect.left - dragOffsetX + 60; // adjust for node width/2
            const newY = e.clientY - containerRect.top - dragOffsetY + 20;
            dragNode.data.x = newX;
            dragNode.data.y = newY;
            // Update position visually
            dragNode.el.style.left = (newX - 60) + 'px';
            dragNode.el.style.top = (newY - 20) + 'px';
            // Update lines
            renderLines();
        }

        function onMouseUp(e) {
            if (dragNode) {
                dragNode.el.classList.remove('dragging');
                dragNode = null;
                saveMindmap();
                renderLines();
            }
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        }

        // ----- Drag (touch) -----
        function onNodeTouchStart(e) {
            if (e.target.closest('.add-child-btn') || e.target.closest('.child-input-container')) return;
            if (e.target.closest('.edit-input')) return;
            const touch = e.touches[0];
            if (!touch) return;
            const nodeEl = this;
            const id = parseInt(nodeEl.dataset.id);
            const nodeData = findNodeById(mindmapData, id);
            if (!nodeData) return;
            const rect = nodeEl.getBoundingClientRect();
            const containerRect = document.getElementById('mindmapContainer').getBoundingClientRect();
            dragNode = { el: nodeEl, data: nodeData };
            dragOffsetX = touch.clientX - rect.left;
            dragOffsetY = touch.clientY - rect.top;
            nodeEl.classList.add('dragging');

            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend', onTouchEnd, { passive: false });
            document.addEventListener('touchcancel', onTouchEnd, { passive: false });
        }

        function onTouchMove(e) {
            e.preventDefault();
            if (!dragNode) return;
            const touch = e.touches[0];
            if (!touch) return;
            const containerRect = document.getElementById('mindmapContainer').getBoundingClientRect();
            const newX = touch.clientX - containerRect.left - dragOffsetX + 60;
            const newY = touch.clientY - containerRect.top - dragOffsetY + 20;
            dragNode.data.x = newX;
            dragNode.data.y = newY;
            dragNode.el.style.left = (newX - 60) + 'px';
            dragNode.el.style.top = (newY - 20) + 'px';
            renderLines();
        }

        function onTouchEnd(e) {
            if (dragNode) {
                dragNode.el.classList.remove('dragging');
                dragNode = null;
                saveMindmap();
                renderLines();
            }
            document.removeEventListener('touchmove', onTouchMove);
            document.removeEventListener('touchend', onTouchEnd);
            document.removeEventListener('touchcancel', onTouchEnd);
        }

        // ----- Helper: render only lines (for performance during drag) -----
        function renderLines() {
            if (!mindmapData) return;
            let svgContent = '';
            function traverse(node, parentId) {
                if (!node) return;
                if (parentId !== null) {
                    const parent = findNodeById(mindmapData, parentId);
                    if (parent) {
                        svgContent += `<path d="M${parent.x},${parent.y} L${node.x},${node.y}" />`;
                    }
                }
                if (node.children) {
                    for (let child of node.children) {
                        traverse(child, node.id);
                    }
                }
            }
            traverse(mindmapData, null);
            mindmapSvg.innerHTML = svgContent;
        }

        // ============================================================
        // 6. MAIN ACTIONS
        // ============================================================

        // Create mindmap from journal input
        function createMindmap() {
            const text = journalInput.value.trim();
            if (!text) {
                journalInput.placeholder = 'Please write something first…';
                journalInput.style.borderColor = '#f7a08c';
                setTimeout(() => { journalInput.style.borderColor = ''; }, 1500);
                return;
            }
            // Reset mindmap data with a single root
            mindmapData = {
                id: nextId++,
                text: text,
                children: [],
                x: 0,
                y: 0
            };
            autoLayout(); // positions and renders
            saveMindmap();
            // Clear input
            journalInput.value = '';
        }

        // Clear mindmap
        function clearMindmap() {
            if (mindmapData && !confirm('Clear your mindmap?')) return;
            mindmapData = null;
            nextId = 1;
            localStorage.removeItem('yurika_journal_mindmap');
            localStorage.removeItem('yurika_journal_nextId');
            renderMindmap();
        }

        // ============================================================
        // 7. INITIALISATION
        // ============================================================

        // Load saved mindmap
        const loaded = loadMindmap();
        if (loaded) {
            // If loaded, render already done in loadMindmap, but we need to attach events
            // renderMindmap called inside loadMindmap -> so fine.
        } else {
            // Show empty state
            renderMindmap();
        }

        // Event listeners for buttons
        createBtn.addEventListener('click', createMindmap);
        autoLayoutBtn.addEventListener('click', () => {
            if (mindmapData) {
                autoLayout();
                saveMindmap();
            }
        });
        clearBtn.addEventListener('click', clearMindmap);

        // Also allow Enter in journal input to create (Ctrl+Enter)
        journalInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                createMindmap();
            }
        });

        // ============================================================
        // 8. PWA SERVICE WORKER (optional)
        // ============================================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js').then(function(reg) {
                    console.log('🌸 Yurika PWA: Service Worker registered successfully!', reg);
                }).catch(function(err) {
                    console.log('🌸 Yurika PWA: Service Worker registration failed.', err);
                });
            });
        }

        console.log('🌸 Yurika Journal – Mindmap ready. Enjoy your clarity.');
    })();
</script>
